<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>flask-deploy-demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body class="bg-light">
    <nav class="navbar navbar-dark bg-primary">
      <div class="container">
        <a class="navbar-brand" href="/">flask-deploy-demo</a>
        <a class="nav-link text-light" href="/about">About</a>
      </div>
    </nav>

    <main class="container py-5">
      <div class="card p-4 shadow-sm">
        <h1>Welcome</h1>
        <p>This app demonstrates a CI/CD pipeline: tests → Docker → push → deploy.</p>

        <form method="post" action="/submit" class="mt-3">
          <div class="mb-2">
            <input class="form-control" name="text" placeholder="Type a short message" />
          </div>
          <button class="btn btn-primary">Send</button>
        </form>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <div class="mt-3">
            {% for m in messages %}
              <div class="alert alert-info">{{ m }}</div>
            {% endfor %}
            </div>
          {% endif %}
        {% endwith %}
      </div>
    </main>
  </body>
</html>
