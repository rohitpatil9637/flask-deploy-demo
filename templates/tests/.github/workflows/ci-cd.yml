name: CI / CD - tests, build, push, deploy

on:
  push:
    branches: [ main ]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest -q

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/flask-deploy-demo:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/flask-deploy-demo:${{ github.sha }}

      - name: Trigger Render deploy hook (if provided)
        env:
          RENDER_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -n "$RENDER_HOOK" ]; then
            echo "Calling Render deploy hook..."
            curl -s -X POST "$RENDER_HOOK"
          else
            echo "RENDER_DEPLOY_HOOK not set; skipping deploy trigger."
          fi